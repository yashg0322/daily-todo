services:
  - type: web
    name: daily-todo
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: JWT_SECRET
        value: daily-todo-stable-secret-change-me-in-dashboard
    healthCheckPath: /api/health
